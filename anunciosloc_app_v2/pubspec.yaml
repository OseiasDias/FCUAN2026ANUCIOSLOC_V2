name: anunciosloc_app
description: AnunciosLoc - Sistema de Anuncios por Localizacao com Google Maps e MULA

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  android_intent_plus: ^5.1.0


  # UI e Icones
  cupertino_icons: 1.0.8
  
  # SOAP e HTTP
  http: 1.3.0
  xml: 6.5.0
  
  # Armazenamento local
  shared_preferences: 2.2.3
  
  # Localizacao e Mapas
  geolocator: 11.1.0
  google_maps_flutter: 2.9.0
  geocoding: 3.0.0
  
  # Gerenciamento de estado
  provider: 6.1.2
  
  # Animacoes de loading
  loading_animation_widget: 1.2.1
  
  # Rede e Conectividade
  network_info_plus: 6.0.1
  connectivity_plus: 6.0.3
  
  # Permissoes
  permission_handler: 11.3.1
  
  # QR Code para MULA
  mobile_scanner: 6.0.2
  qr_flutter: 4.1.0
  
  # Utilitarios
  path_provider: 2.1.3
  sqflite: 2.3.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/